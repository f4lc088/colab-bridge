<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Dev</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080a0f; color: #e2e8f0; font-family: monospace; height: 100vh; display: flex; flex-direction: column; }
header { padding: 14px 16px; border-bottom: 1px solid #1e2330; display: flex; align-items: center; gap: 10px; background: #080a0f; }
.logo { width: 34px; height: 34px; background: linear-gradient(135deg, #00e5ff, #6366f1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
h1 { font-size: 15px; font-weight: bold; }
#msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.user-msg { align-self: flex-end; background: #1e3a5f; border-radius: 16px 16px 4px 16px; padding: 10px 14px; max-width: 80%; font-size: 14px; color: #bfdbfe; }
.bot-msg { align-self: flex-start; background: #111318; border: 1px solid #1e2330; border-radius: 4px 16px 16px 16px; padding: 10px 14px; max-width: 90%; font-size: 14px; line-height: 1.6; }
footer { padding: 12px 16px; border-top: 1px solid #1e2330; display: flex; gap: 10px; }
input { flex: 1; background: #111318; border: 1px solid #1e2330; border-radius: 12px; padding: 12px 16px; color: #e2e8f0; font-size: 14px; outline: none; }
button { background: linear-gradient(135deg, #00e5ff, #6366f1); color: #000; border: none; border-radius: 12px; padding: 12px 20px; font-size: 16px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
<header>
  <div class="logo">⚡</div>
  <div><h1>Claude Dev</h1><p style="font-size:11px;color:#4b5563">android-app</p></div>
</header>
<div id="msgs">
  <div class="bot-msg">Ciao! Dimmi cosa vuoi fare con l'app Android. Modifico GitHub direttamente!</div>
</div>
<footer>
  <input type="text" id="inp" placeholder="Scrivi qui..." />
  <button id="btn">▶</button>
</footer>
<script>
var history = [];
var busy = false;

document.getElementById("btn").addEventListener("click", function() {
  sendMsg();
});

document.getElementById("inp").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMsg();
});

function sendMsg() {
  if (busy) return;
  var text = document.getElementById("inp").value.trim();
  if (!text) return;
  
  document.getElementById("inp").value = "";
  busy = true;
  document.getElementById("btn").disabled = true;
  
  var msgs = document.getElementById("msgs");
  
  var userDiv = document.createElement("div");
  userDiv.className = "user-msg";
  userDiv.textContent = text;
  msgs.appendChild(userDiv);
  
  var botDiv = document.createElement("div");
  botDiv.className = "bot-msg";
  botDiv.textContent = "Elaboro...";
  msgs.appendChild(botDiv);
  msgs.scrollTop = msgs.scrollHeight;
  
  history.push({role: "user", content: text});
  
  fetch("https://colab-bridge.onrender.com/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({pw: "colab1234", message: text, history: history.slice(-20)})
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var reply = data.reply || data.error || "Errore";
    botDiv.textContent = reply;
    history.push({role: "assistant", content: reply});
    msgs.scrollTop = msgs.scrollHeight;
    busy = false;
    document.getElementById("btn").disabled = false;
  })
  .catch(function(e) {
    botDiv.textContent = "Errore: " + e.message;
    busy = false;
    document.getElementById("btn").disabled = false;
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Claude Dev</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080a0f;--surface:#111318;--border:#1e2330;--accent:#00e5ff;--green:#00ffa3;--text:#e2e8f0;--muted:#4b5563}
body{background:var(--bg);color:var(--text);font-family:"JetBrains Mono",monospace;height:100vh;display:flex;flex-direction:column}
header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(8,10,15,.97)}
.logo{width:30px;height:30px;background:linear-gradient(135deg,#00e5ff,#6366f1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
h1{font-family:"Syne",sans-serif;font-size:14px;font-weight:800}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);margin-left:auto;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#msgs{flex:1;overflow-y:auto;padding:12px 16px}
.msg{margin-bottom:10px}
.user{display:flex;justify-content:flex-end}
.user .b{background:#1e3a5f;border-radius:12px 12px 2px 12px;padding:10px 14px;max-width:80%;color:#bfdbfe;font-size:13px;line-height:1.5}
.bot .b{background:var(--surface);border:1px solid var(--border);border-radius:2px 12px 12px 12px;padding:10px 14px;font-size:13px;line-height:1.6}
.thinking{color:var(--muted);font-size:12px;font-style:italic}
.tool-result{background:#0d1117;border:1px solid #2d3748;border-radius:6px;padding:8px;margin-top:6px;font-size:11px;color:#7dd3fc}
footer{padding:10px 16px;border-top:1px solid var(--border);background:rgba(8,10,15,.97)}
.row{display:flex;gap:8px}
textarea{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:none;line-height:1.5}
button{background:linear-gradient(135deg,var(--accent),#6366f1);color:#000;border:none;border-radius:10px;padding:0 16px;font-size:16px;cursor:pointer;flex-shrink:0}
button:disabled{background:var(--surface);color:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="logo">⚡</div>
  <div><h1>Claude Dev</h1><p style="font-size:10px;color:var(--muted)">android-app</p></div>
  <div class="dot"></div>
</header>
<div id="msgs">
  <div class="msg bot"><div class="b">Ciao! Dimmi cosa vuoi fare con l'app Android. Posso leggere e modificare file su GitHub direttamente. </div></div>
</div>
<footer>
  <div class="row">
    <textarea id="inp" rows="2" placeholder="Es: aggiungi un bottone rosso..."></textarea>
    <button id="btn" onclick="send()">&#9654;</button>
  </div>
</footer>
<script>
const BRIDGE = "https://colab-bridge.onrender.com";
const PW = "colab1234";
let chatHistory = [];
let busy = false;

function addMsg(role, html) {
  const d = document.createElement("div");
  d.className = "msg " + role;
  d.innerHTML = "<div class='b'>" + html + "</div>";
  const msgs = document.getElementById("msgs");
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}

async function send() {
  const inp = document.getElementById("inp");
  const btn = document.getElementById("btn");
  const text = inp.value.trim();
  if (!text || busy) return;
  busy = true;
  btn.disabled = true;
  inp.value = "";

  addMsg("user", text);
  const thinking = addMsg("bot", "<span class='thinking'>Sto elaborando...</span>");

  try {
    const res = await fetch(BRIDGE + "/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({pw: PW, message: text, history: chatHistory})
    });
    const data = await res.json();
    thinking.remove();

    if (data.error) {
      addMsg("bot", "Errore: " + data.error);
    } else {
      const reply = data.reply || "";
      let html = reply.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
      
      if (data.tool_results && data.tool_results.length > 0) {
        data.tool_results.forEach(function(t) {
          const res_str = JSON.stringify(t.result || t.error || "").substring(0, 200);
          html += "<div class='tool-result'>Tool: " + t.tool + " - " + res_str + "</div>";
        });
      }
      addMsg("bot", html);
      chatHistory.push({role: "user", content: text});
      chatHistory.push({role: "assistant", content: reply});
      if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
    }
  } catch(e) {
    thinking.remove();
    addMsg("bot", "Errore di connessione: " + e.message);
  }
  busy = false;
  btn.disabled = false;
}

document.getElementById("inp").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
</script>
</body>
</html>

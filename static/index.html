<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c1c1e">
<title>Claude Dev</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#1c1c1e;color:#f2f2f7;font-family:'Inter',sans-serif}
body{display:flex;flex-direction:column}

/* Overlay e Sidebar */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;display:none}
#sidebar{position:fixed;top:0;left:0;width:78%;max-width:290px;height:100%;background:#111114;z-index:100;display:flex;flex-direction:column;border-right:1px solid #2c2c2e;transform:translateX(-100%);transition:transform .28s ease}
#sidebar.open{transform:translateX(0)}
.sidehead{padding:16px;border-bottom:1px solid #2c2c2e;display:flex;align-items:center;justify-content:space-between}
.sidehead h2{font-size:16px;font-weight:600}
.newbig{background:#d97706;color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600}
#chatlist{flex:1;overflow-y:auto;padding:8px}
.ci{padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.ci:active,.ci.active{background:#2c2c2e}
.ci-title{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-date{font-size:11px;color:#636366;flex-shrink:0}
.ci-del{background:none;border:none;color:#636366;cursor:pointer;font-size:18px;padding:0 4px;line-height:1}

/* Header */
.topbar{display:flex;align-items:center;padding:12px 14px;gap:10px;background:#1c1c1e;border-bottom:1px solid #2c2c2e;flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top))}
.menubtn{background:none;border:none;color:#f2f2f7;cursor:pointer;padding:4px;display:flex;align-items:center;flex-shrink:0}
.logo{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#d97706,#f59e0b);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.topinfo{flex:1}
.topinfo h1{font-size:15px;font-weight:600}
.topinfo p{font-size:11px;color:#8e8e93;margin-top:1px}

/* Memoria bar */
#membar{background:#2c2c2e;padding:7px 16px;font-size:12px;color:#8e8e93;display:none;align-items:center;gap:8px;flex-shrink:0}
.memdot{width:5px;height:5px;border-radius:50%;background:#f59e0b;flex-shrink:0}

/* Messaggi */
#msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.row{display:flex;gap:8px;align-items:flex-end}
.row.me{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.av.c{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff}
.av.u{background:#3a3a3c;color:#aeaeb2}
.bub{max-width:78%;padding:10px 14px;font-size:15px;line-height:1.55;word-break:break-word}
.bub.c{background:#2c2c2e;border-radius:18px 18px 18px 4px;color:#f2f2f7}
.bub.u{background:#d97706;border-radius:18px 18px 4px 18px;color:#fff}
.bub.wait{color:#636366;font-style:italic}
.bub.err{background:#2a0a0a;color:#ff6b6b;border-radius:18px 18px 18px 4px}
.bub img{max-width:100%;border-radius:10px;display:block;margin-bottom:6px}
.pill{display:inline-flex;align-items:center;gap:4px;background:#1c2e1c;border:1px solid #2d4a2d;border-radius:20px;padding:2px 9px;font-size:11px;color:#4ade80;margin-top:5px;margin-right:4px}

/* Input */
#imgprev{max-height:70px;border-radius:10px;margin:0 16px 8px;display:none}
.inputarea{padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:#1c1c1e;border-top:1px solid #2c2c2e;flex-shrink:0}
.inputbox{background:#2c2c2e;border-radius:22px;padding:8px 8px 8px 14px;display:flex;align-items:flex-end;gap:8px}
textarea{flex:1;background:none;border:none;color:#f2f2f7;font-size:15px;font-family:inherit;outline:none;resize:none;line-height:1.5;max-height:100px;overflow-y:auto;padding:2px 0}
textarea::placeholder{color:#636366}
.icobtn{background:none;border:none;color:#8e8e93;cursor:pointer;padding:4px;border-radius:8px;display:flex;align-items:center}
.sendbtn{width:32px;height:32px;border-radius:50%;background:#d97706;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sendbtn:disabled{background:#3a3a3c;color:#636366}
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div class="sidehead">
    <h2>Chat</h2>
    <button class="newbig" onclick="startNew()">+ Nuova</button>
  </div>
  <div id="chatlist"></div>
</div>

<div class="topbar">
  <button class="menubtn" id="menubtn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <div class="logo">C</div>
  <div class="topinfo">
    <h1>Claude Dev</h1>
    <p id="sub">android-app</p>
  </div>
</div>

<div id="membar">
  <div class="memdot"></div>
  <span id="memtxt"></span>
</div>

<div id="msgs"></div>

<img id="imgprev"/>

<div class="inputarea">
  <div class="inputbox">
    <textarea id="inp" rows="1" placeholder="Messaggio..."></textarea>
    <button class="icobtn" id="imgbtn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </button>
    <button class="sendbtn" id="sendbtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<input type="file" id="fileinp" accept="image/*" style="display:none"/>

<script>
// ── State ──
var hist = [], busy = false, img64 = null;
var currentId = null, chats = {};

// ── Init ──
window.addEventListener("DOMContentLoaded", function() {
  // Textarea auto-resize
  var ta = document.getElementById("inp");
  ta.addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 100) + "px";
  });
  ta.addEventListener("keypress", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  // Pulsanti
  document.getElementById("menubtn").addEventListener("click", openSidebar);
  document.getElementById("sendbtn").addEventListener("click", send);
  document.getElementById("imgbtn").addEventListener("click", function() {
    document.getElementById("fileinp").click();
  });
  document.getElementById("fileinp").addEventListener("change", function() {
    var f = this.files[0];
    if (!f) return;
    var rd = new FileReader();
    rd.onload = function(e) {
      img64 = e.target.result;
      var p = document.getElementById("imgprev");
      p.src = img64;
      p.style.display = "block";
    };
    rd.readAsDataURL(f);
  });

  // Carica chat salvate
  loadChats();
  renderChatList();
  startNew();
});

// ── Sidebar ──
function openSidebar() {
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("overlay").style.display = "block";
  renderChatList();
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").style.display = "none";
}

// ── Chat management ──
function loadChats() {
  try {
    var s = localStorage.getItem("cdv5");
    if (s) chats = JSON.parse(s);
  } catch(e) { chats = {}; }
}

function saveChats() {
  try { localStorage.setItem("cdv5", JSON.stringify(chats)); } catch(e) {}
}

function renderChatList() {
  var el = document.getElementById("chatlist");
  var ids = Object.keys(chats).sort(function(a,b) { return chats[b].ts - chats[a].ts; });
  if (ids.length === 0) {
    el.innerHTML = "<div style='padding:16px;color:#636366;font-size:13px'>Nessuna chat salvata</div>";
    return;
  }
  el.innerHTML = "";
  ids.forEach(function(id) {
    var c = chats[id];
    var div = document.createElement("div");
    div.className = "ci" + (id === currentId ? " active" : "");
    var date = new Date(c.ts).toLocaleDateString("it-IT", {day:"2-digit", month:"2-digit"});
    div.innerHTML = "<span class='ci-title'>" + c.title + "</span>" +
                    "<span class='ci-date'>" + date + "</span>" +
                    "<button class='ci-del' data-id='" + id + "'>×</button>";
    div.querySelector(".ci-del").addEventListener("click", function(e) {
      e.stopPropagation();
      if (confirm("Eliminare?")) {
        delete chats[this.dataset.id];
        saveChats();
        if (this.dataset.id === currentId) startNew();
        else renderChatList();
      }
    });
    div.addEventListener("click", function() { loadChat(id); });
    el.appendChild(div);
  });
}

function loadChat(id) {
  closeSidebar();
  var c = chats[id];
  if (!c) return;
  currentId = id;
  hist = c.history || [];
  document.getElementById("msgs").innerHTML = "";
  (c.messages || []).forEach(function(m) { addBub(m.r, m.t, m.i); });
  document.getElementById("sub").textContent = c.title;
  showMem();
  renderChatList();
}

function startNew() {
  closeSidebar();
  currentId = null;
  hist = [];
  img64 = null;
  document.getElementById("imgprev").style.display = "none";
  document.getElementById("msgs").innerHTML = "";
  document.getElementById("membar").style.display = "none";
  document.getElementById("sub").textContent = "android-app";
  addBub("c", "Nuova chat! Dimmi cosa vuoi fare con l'app Android. Modifico GitHub direttamente. 🚀");
  renderChatList();
}

function showMem() {
  document.getElementById("membar").style.display = "flex";
  document.getElementById("memtxt").textContent = Math.floor(hist.length/2) + " messaggi in memoria";
}

// ── UI ──
function addBub(role, txt, im) {
  var row = document.createElement("div");
  row.className = "row" + (role === "u" ? " me" : "");
  var av = document.createElement("div");
  av.className = "av " + role;
  av.textContent = role === "c" ? "C" : "Tu";
  var b = document.createElement("div");
  b.className = "bub " + role;
  if (im) { var ig = document.createElement("img"); ig.src = im; b.appendChild(ig); }
  b.appendChild(document.createTextNode(txt || ""));
  row.appendChild(av);
  row.appendChild(b);
  document.getElementById("msgs").appendChild(row);
  document.getElementById("msgs").scrollTop = 99999;
  return b;
}

// ── Send ──
function send() {
  if (busy) return;
  var ta = document.getElementById("inp");
  var txt = ta.value.trim();
  var im = img64;
  if (!txt && !im) return;

  ta.value = ""; ta.style.height = "auto";
  busy = true;
  document.getElementById("sendbtn").disabled = true;
  img64 = null;
  document.getElementById("imgprev").style.display = "none";
  document.getElementById("fileinp").value = "";

  addBub("u", txt || "📷", im);
  var lb = addBub("c", "...");
  lb.className = "bub c wait";

  var msg = txt || (im ? "[immagine]" : "");
  if (im && txt) msg = txt + " [immagine allegata]";

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "/chat", true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.timeout = 90000;

  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      var rep = d.reply || d.error || "Errore";
      lb.textContent = rep;
      lb.className = "bub c";

      if (d.tool_results && d.tool_results.length) {
        d.tool_results.forEach(function(t) {
          var p = document.createElement("span");
          p.className = "pill";
          p.textContent = (t.error ? "❌" : "✅") + " " + t.tool;
          lb.appendChild(document.createElement("br"));
          lb.appendChild(p);
        });
      }

      hist.push({role:"user", content:msg});
      hist.push({role:"assistant", content:rep});

      // Salva chat
      if (!currentId) currentId = "chat_" + Date.now();
      if (!chats[currentId]) {
        chats[currentId] = {id:currentId, title:txt.substring(0,35)||"Chat", ts:Date.now(), history:[], messages:[]};
      }
      chats[currentId].ts = Date.now();
      chats[currentId].history = hist.slice(-40);
      chats[currentId].messages.push({r:"u", t:txt||"📷", i:im||null});
      chats[currentId].messages.push({r:"c", t:rep});
      if (chats[currentId].messages.length > 100) chats[currentId].messages = chats[currentId].messages.slice(-100);
      saveChats();
      showMem();
      renderChatList();

    } catch(e) {
      lb.textContent = "Errore: " + e.message;
      lb.className = "bub c err";
    }
    busy = false;
    document.getElementById("sendbtn").disabled = false;
    document.getElementById("msgs").scrollTop = 99999;
  };

  xhr.onerror = function() { lb.textContent = "Errore rete"; lb.className = "bub c err"; busy = false; document.getElementById("sendbtn").disabled = false; };
  xhr.ontimeout = function() { lb.textContent = "Timeout"; lb.className = "bub c err"; busy = false; document.getElementById("sendbtn").disabled = false; };

  xhr.send(JSON.stringify({pw:"colab1234", message:msg, history:hist.slice(-20)}));
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Claude Dev</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#1a1a1a;color:#ececec;font-family:'Inter',sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #2a2a2a;background:#1a1a1a;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;background:linear-gradient(135deg,#c96442,#e8956d);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;flex-shrink:0}
.model-name{font-size:15px;font-weight:600;color:#ececec}
.model-sub{font-size:11px;color:#888;margin-top:1px}
.new-chat-btn{background:none;border:1px solid #333;color:#aaa;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.new-chat-btn:active{background:#2a2a2a}

/* Context bar */
.context-bar{background:#242424;padding:8px 16px;font-size:12px;color:#888;border-bottom:1px solid #2a2a2a;display:none;align-items:center;gap:8px;flex-shrink:0}
.context-dot{width:6px;height:6px;border-radius:50%;background:#c96442;flex-shrink:0}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;-webkit-overflow-scrolling:touch}
.msg-row{display:flex;gap:10px;align-items:flex-start}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin-top:2px}
.msg-avatar.claude{background:linear-gradient(135deg,#c96442,#e8956d);color:#fff}
.msg-avatar.user{background:#333;color:#aaa}
.bubble{max-width:85%;padding:10px 14px;border-radius:16px;font-size:15px;line-height:1.6}
.bubble.claude{background:#242424;border-radius:4px 16px 16px 16px;color:#ececec}
.bubble.user{background:#2a2a2a;border-radius:16px 4px 16px 16px;color:#ececec}
.bubble.loading{color:#666;font-style:italic}
.bubble.error{background:#2a0a0a;color:#f87171}
.bubble img{max-width:100%;border-radius:8px;margin-top:6px}
.tool-pill{display:inline-flex;align-items:center;gap:4px;background:#1a2a1a;border:1px solid #2a4a2a;border-radius:20px;padding:3px 10px;font-size:12px;color:#4ade80;margin-top:6px;margin-right:4px}

/* Input area */
.input-area{padding:12px 16px;background:#1a1a1a;border-top:1px solid #2a2a2a;flex-shrink:0}
.input-box{background:#242424;border:1px solid #333;border-radius:16px;padding:10px 14px;display:flex;align-items:flex-end;gap:8px;transition:border-color .2s}
.input-box:focus-within{border-color:#555}
textarea{flex:1;background:none;border:none;color:#ececec;font-size:15px;font-family:inherit;outline:none;resize:none;line-height:1.5;max-height:120px;overflow-y:auto}
textarea::placeholder{color:#555}
.input-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.img-btn{background:none;border:none;color:#666;cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.img-btn:active{background:#333;color:#aaa}
.send-btn{width:34px;height:34px;background:#c96442;border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:opacity .2s}
.send-btn:disabled{opacity:.4}
.send-btn:active{opacity:.7}
#file-input{display:none}
.img-preview{max-width:120px;max-height:80px;border-radius:8px;margin-bottom:8px;display:none}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="avatar">C</div>
    <div>
      <div class="model-name">Claude Dev</div>
      <div class="model-sub" id="status-text">android-app · live</div>
    </div>
  </div>
  <button class="new-chat-btn" onclick="newChat()">&#43; Nuova</button>
</div>

<div class="context-bar" id="ctx-bar">
  <div class="context-dot"></div>
  <span id="ctx-text">Contesto caricato</span>
</div>

<div class="msgs" id="msgs">
  <div class="msg-row">
    <div class="msg-avatar claude">C</div>
    <div class="bubble claude">Ciao! Sono il tuo sviluppatore Android. Dimmi cosa vuoi fare con l'app e modifico GitHub direttamente — senza copia-incolla. 🚀</div>
  </div>
</div>

<div class="input-area">
  <img id="img-preview" class="img-preview" />
  <div class="input-box">
    <textarea id="inp" rows="1" placeholder="Messaggio..."></textarea>
    <div class="input-actions">
      <button class="img-btn" onclick="document.getElementById('file-input').click()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
  <input type="file" id="file-input" accept="image/*" onchange="handleImage(this)" />
</div>

<script>
var history = [];
var busy = false;
var pendingImage = null;

// Auto-resize
var ta = document.getElementById("inp");
ta.addEventListener("input", function(){
  this.style.height="auto";
  this.style.height=Math.min(this.scrollHeight,120)+"px";
});
ta.addEventListener("keypress", function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}
});

// Immagine
function handleImage(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    pendingImage = e.target.result;
    var prev = document.getElementById("img-preview");
    prev.src = pendingImage;
    prev.style.display = "block";
  };
  reader.readAsDataURL(file);
}

// Memoria
function loadMemory() {
  try {
    var s = localStorage.getItem("claudedev_v3");
    if (s) {
      var d = JSON.parse(s);
      history = d.history || [];
      if (history.length > 0) {
        document.getElementById("ctx-bar").style.display = "flex";
        document.getElementById("ctx-text").textContent = Math.floor(history.length/2) + " messaggi in memoria";
        document.getElementById("status-text").textContent = "android-app · " + Math.floor(history.length/2) + " msg salvati";
        addBubble("claude", "Bentornato! Ho memoria di " + Math.floor(history.length/2) + " scambi. Continua pure da dove eravamo rimasti.");
      }
    }
  } catch(e){}
}

function saveMemory() {
  try {
    localStorage.setItem("claudedev_v3", JSON.stringify({history: history.slice(-40)}));
    document.getElementById("ctx-bar").style.display = "flex";
    document.getElementById("ctx-text").textContent = Math.floor(history.length/2) + " messaggi in memoria";
  } catch(e){}
}

function newChat() {
  if (!confirm("Cancellare la memoria e iniziare una nuova chat?")) return;
  localStorage.removeItem("claudedev_v3");
  history = [];
  pendingImage = null;
  document.getElementById("img-preview").style.display = "none";
  document.getElementById("msgs").innerHTML = "";
  document.getElementById("ctx-bar").style.display = "none";
  document.getElementById("status-text").textContent = "android-app · live";
  addBubble("claude", "Nuova chat! Come posso aiutarti? 🚀");
}

function addBubble(role, text, imgSrc) {
  var row = document.createElement("div");
  row.className = "msg-row" + (role==="user"?" user":"");
  var av = document.createElement("div");
  av.className = "msg-avatar " + role;
  av.textContent = role==="claude" ? "C" : "Tu";
  var bub = document.createElement("div");
  bub.className = "bubble " + role;
  if (imgSrc) {
    var img = document.createElement("img");
    img.src = imgSrc;
    bub.appendChild(img);
    bub.appendChild(document.createElement("br"));
  }
  bub.appendChild(document.createTextNode(text));
  row.appendChild(av);
  row.appendChild(bub);
  document.getElementById("msgs").appendChild(row);
  document.getElementById("msgs").scrollTop = 99999;
  return bub;
}

function sendMsg() {
  if (busy) return;
  var text = ta.value.trim();
  var img = pendingImage;
  if (!text && !img) return;

  ta.value = "";
  ta.style.height = "auto";
  busy = true;
  document.getElementById("send-btn").disabled = true;

  addBubble("user", text || "📷 Immagine", img);
  pendingImage = null;
  document.getElementById("img-preview").style.display = "none";

  var loadBub = addBubble("claude", "...");
  loadBub.className = "bubble claude loading";

  var msgContent = text;
  if (img) msgContent = (text ? text + "\n" : "") + "[Immagine allegata]";

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "/chat", true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.timeout = 90000;

  xhr.onload = function() {
    try {
      var data = JSON.parse(xhr.responseText);
      var reply = data.reply || data.error || "Errore";
      loadBub.textContent = reply;
      loadBub.className = "bubble claude";
      if (data.tool_results && data.tool_results.length) {
        data.tool_results.forEach(function(t) {
          var pill = document.createElement("span");
          pill.className = "tool-pill";
          pill.textContent = (t.error?"❌":"✅") + " " + t.tool;
          loadBub.appendChild(document.createElement("br"));
          loadBub.appendChild(pill);
        });
      }
      history.push({role:"user", content: msgContent});
      history.push({role:"assistant", content: reply});
      saveMemory();
    } catch(e) {
      loadBub.textContent = "Errore: " + e.message;
      loadBub.className = "bubble claude error";
    }
    busy = false;
    document.getElementById("send-btn").disabled = false;
    document.getElementById("msgs").scrollTop = 99999;
  };

  xhr.onerror = function() {
    loadBub.textContent = "Errore di rete";
    loadBub.className = "bubble claude error";
    busy = false;
    document.getElementById("send-btn").disabled = false;
  };

  xhr.ontimeout = function() {
    loadBub.textContent = "Timeout — riprova";
    loadBub.className = "bubble claude error";
    busy = false;
    document.getElementById("send-btn").disabled = false;
  };

  xhr.send(JSON.stringify({pw:"colab1234", message: msgContent, history: history.slice(-20)}));
}

loadMemory();
</script>
</body>
</html>

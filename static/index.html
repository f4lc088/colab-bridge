<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a1a">
<link rel="manifest" href="/manifest.json">
<title>Claude Dev</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#1c1c1e;color:#f2f2f7;font-family:'Inter',sans-serif}
body{display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;padding:12px 16px;gap:12px;background:#1c1c1e;border-bottom:1px solid #2c2c2e;flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top))}
.logo{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#d97706,#f59e0b);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex-shrink:0}
.topinfo{flex:1}
.topinfo h1{font-size:16px;font-weight:600}
.topinfo p{font-size:11px;color:#8e8e93;margin-top:1px}
.topbtn{background:#2c2c2e;border:none;color:#f2f2f7;border-radius:10px;padding:7px 13px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500}
.membar{background:#2c2c2e;padding:8px 16px;font-size:12px;color:#8e8e93;display:none;align-items:center;gap:8px;flex-shrink:0}
.memdot{width:6px;height:6px;border-radius:50%;background:#f59e0b;flex-shrink:0}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.row{display:flex;gap:8px;align-items:flex-end}
.row.me{flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.av.c{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff}
.av.u{background:#3a3a3c;color:#aeaeb2}
.bub{max-width:78%;padding:10px 14px;font-size:15px;line-height:1.55;word-break:break-word}
.bub.c{background:#2c2c2e;border-radius:18px 18px 18px 4px;color:#f2f2f7}
.bub.u{background:#d97706;border-radius:18px 18px 4px 18px;color:#fff}
.bub.wait{color:#636366;font-style:italic}
.bub.err{background:#3a1a1a;color:#ff6b6b;border-radius:18px 18px 18px 4px}
.bub img{max-width:100%;border-radius:10px;display:block;margin-bottom:6px}
.pill{display:inline-flex;align-items:center;gap:4px;background:#1c2e1c;border:1px solid #2d4a2d;border-radius:20px;padding:2px 9px;font-size:11px;color:#4ade80;margin-top:5px;margin-right:4px}
.imgprev{max-height:80px;border-radius:10px;margin:0 16px 8px;display:none}
.inputarea{padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:#1c1c1e;border-top:1px solid #2c2c2e;flex-shrink:0}
.inputbox{background:#2c2c2e;border-radius:20px;padding:8px 8px 8px 14px;display:flex;align-items:flex-end;gap:8px}
textarea{flex:1;background:none;border:none;color:#f2f2f7;font-size:15px;font-family:inherit;outline:none;resize:none;line-height:1.5;max-height:100px;overflow-y:auto;padding:2px 0}
textarea::placeholder{color:#636366}
.icobtn{background:none;border:none;color:#8e8e93;cursor:pointer;padding:4px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icobtn:active{background:#3a3a3c}
.sendbtn{width:32px;height:32px;border-radius:50%;background:#d97706;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sendbtn:disabled{background:#3a3a3c;color:#636366}
.sendbtn:active{opacity:.7}
</style>
</head>
<body>
<div class="topbar">
  <div class="av c">C</div>
  <div class="topinfo">
    <h1>Claude Dev</h1>
    <p id="sub">android-app</p>
  </div>
  <button class="topbtn" onclick="newChat()">Nuova</button>
</div>
<div class="membar" id="membar">
  <div class="memdot"></div>
  <span id="memtxt">Memoria attiva</span>
</div>
<div class="msgs" id="msgs">
  <div class="row">
    <div class="av c">C</div>
    <div class="bub c">Ciao! Dimmi cosa vuoi fare con l'app Android. Modifico GitHub direttamente, manda anche screenshot se vuoi. 🚀</div>
  </div>
</div>
<img id="imgprev" class="imgprev"/>
<div class="inputarea">
  <div class="inputbox">
    <textarea id="inp" rows="1" placeholder="Messaggio..."></textarea>
    <button class="icobtn" onclick="document.getElementById('fileinp').click()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
      </svg>
    </button>
    <button class="sendbtn" id="sendbtn" onclick="send()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>
<input type="file" id="fileinp" accept="image/*" style="display:none" onchange="onImg(this)"/>
<script>
var hist=[], busy=false, img64=null;
var ta=document.getElementById("inp");
ta.addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,100)+"px";});
ta.addEventListener("keypress",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});

function onImg(i){
  var f=i.files[0]; if(!f)return;
  var rd=new FileReader();
  rd.onload=function(e){
    img64=e.target.result;
    var p=document.getElementById("imgprev");
    p.src=img64; p.style.display="block";
  };
  rd.readAsDataURL(f);
}

function mem(){
  try{
    var s=localStorage.getItem("cdv4");
    if(s){var d=JSON.parse(s);hist=d.h||[];showMem();}
    if(hist.length>0) addBub("c","Bentornato! Ricordo "+Math.floor(hist.length/2)+" scambi precedenti. Continua pure.");
    else addBub("c","Ciao! Dimmi cosa vuoi fare con l'app Android. 🚀");
  }catch(e){addBub("c","Ciao! Come posso aiutarti? 🚀");}
}

function saveMem(){
  try{localStorage.setItem("cdv4",JSON.stringify({h:hist.slice(-40)}));showMem();}catch(e){}
}

function showMem(){
  document.getElementById("membar").style.display="flex";
  document.getElementById("memtxt").textContent=Math.floor(hist.length/2)+" messaggi in memoria";
  document.getElementById("sub").textContent="android-app · "+Math.floor(hist.length/2)+" msg";
}

function newChat(){
  if(!confirm("Nuova chat? La memoria verrà cancellata."))return;
  localStorage.removeItem("cdv4");
  hist=[];img64=null;
  document.getElementById("imgs").innerHTML="";
  document.getElementById("imgprev").style.display="none";
  document.getElementById("msgs").innerHTML="";
  document.getElementById("membar").style.display="none";
  document.getElementById("sub").textContent="android-app";
  addBub("c","Nuova chat! Come posso aiutarti? 🚀");
}

function addBub(role,txt,im){
  var row=document.createElement("div");
  row.className="row"+(role==="u"?" me":"");
  var av=document.createElement("div");
  av.className="av "+role;
  av.textContent=role==="c"?"C":"Tu";
  var b=document.createElement("div");
  b.className="bub "+role;
  if(im){var ig=document.createElement("img");ig.src=im;b.appendChild(ig);}
  b.appendChild(document.createTextNode(txt||""));
  row.appendChild(av);row.appendChild(b);
  document.getElementById("msgs").appendChild(row);
  document.getElementById("msgs").scrollTop=99999;
  return b;
}

function send(){
  if(busy)return;
  var txt=ta.value.trim(), im=img64;
  if(!txt&&!im)return;
  ta.value="";ta.style.height="auto";
  busy=true;document.getElementById("sendbtn").disabled=true;
  img64=null;document.getElementById("imgprev").style.display="none";
  addBub("u",txt||"📷",im);
  var lb=addBub("c","");lb.className="bub c wait";lb.textContent="...";
  var msg=txt||(im?"[immagine]":"");
  if(im&&txt)msg=txt+" [immagine allegata]";
  var xhr=new XMLHttpRequest();
  xhr.open("POST","/chat",true);
  xhr.setRequestHeader("Content-Type","application/json");
  xhr.timeout=90000;
  xhr.onload=function(){
    try{
      var d=JSON.parse(xhr.responseText);
      var rep=d.reply||d.error||"Errore";
      lb.textContent=rep;lb.className="bub c";
      if(d.tool_results&&d.tool_results.length){
        d.tool_results.forEach(function(t){
          var p=document.createElement("span");
          p.className="pill";p.textContent=(t.error?"❌":"✅")+" "+t.tool;
          lb.appendChild(document.createElement("br"));lb.appendChild(p);
        });
      }
      hist.push({role:"user",content:msg});
      hist.push({role:"assistant",content:rep});
      saveMem();
    }catch(e){lb.textContent="Errore: "+e.message;lb.className="bub c err";}
    busy=false;document.getElementById("sendbtn").disabled=false;
    document.getElementById("msgs").scrollTop=99999;
  };
  xhr.onerror=function(){lb.textContent="Errore rete";lb.className="bub c err";busy=false;document.getElementById("sendbtn").disabled=false;};
  xhr.ontimeout=function(){lb.textContent="Timeout";lb.className="bub c err";busy=false;document.getElementById("sendbtn").disabled=false;};
  xhr.send(JSON.stringify({pw:"colab1234",message:msg,history:hist.slice(-20)}));
}

document.getElementById("msgs").innerHTML="";
mem();
</script>
</body>
</html>
